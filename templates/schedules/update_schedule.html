{% extends "layout/base.html" %}

{% block content %}

<div class="card">
    <h2>✏️ Update Schedule</h2>

    <form id="scheduleForm">

        <!-- ROUTE -->
        <select id="route" required>
            <option value="">Select Route</option>
            {% for r in routes %}
        <option value="{{ r }}">{{ r }}</option>
            {% endfor %}
        </select>
        <br><br>

        <!-- VEHICLE -->
    <select id="vehicle" required>
        <option value="">Select Vehicle</option>
    </select>

        <!-- SHIFT 1 -->
        <h4>Shift 1 (6AM - 2PM)</h4>
        <select id="driver1" required>
    <option value="">Select Driver</option>
    {% for s in staff %}
        {% if s.post == 'driver' %}
            <option value="{{ s.name }}">{{ s.name }}</option>
        {% endif %}
    {% endfor %}
        </select>

    <select id="conductor1" required>
        <option value="">Select Conductor</option>
        {% for s in staff %}
            {% if s.post == 'conductor' %}
                <option value="{{ s.name }}">{{ s.name }}</option>
            {% endif %}
        {% endfor %}
    </select>

        <br><br>

        <!-- SHIFT 2 -->
        <h4>Shift 2 (2PM - 10PM)</h4>
        <select id="driver2" required>
            <option value="">Select Driver</option>
            {% for s in staff %}
        {% if s.post == 'driver' %}
            <option value="{{ s.name }}">{{ s.name }}</option>
        {% endif %}
        {% endfor %}
        </select>

        <select id="conductor2" required>
            <option value="">Select Conductor</option>
            {% for s in staff %}
            {% if s.post == 'conductor' %}
                <option value="{{ s.name }}">{{ s.name }}</option>
            {% endif %}
        {% endfor %}
        </select>

        <br><br>

        <!-- STAGES -->
        <input type="text" id="stages" placeholder="Enter stages (comma separated)" required>
        <br><br>

        <button type="submit">Update Schedule</button>
    </form>

    <p id="message"></p>
</div>

<script>
    console.log("SCRIPT LOADED");

    
document.addEventListener("DOMContentLoaded", function () {

    const vehicles = {{ vehicles | tojson  }};
    const staff = {{ staff | tojson }};

    console.log("Vehicles loaded:", vehicles);
    console.log("Staff:", staff);

    // ================= VEHICLE FILTER =================
    const dropdown = document.getElementById("vehicle");

    // optional safety check
    if (!dropdown) {
        console.error("Vehicle dropdown NOT FOUND");
        return;
    }

    dropdown.innerHTML = '<option value="">Select Vehicle</option>';

    vehicles.forEach(v => {
        if (!v.vehicle_number) return;

        const option = document.createElement("option");
        option.value = v.vehicle_number;
        option.textContent = v.vehicle_number;
        dropdown.appendChild(option);
    });


    // ================= SUBMIT =================
    const updateUrl = "/schedule/api/update_schedule";

document.getElementById("scheduleForm").addEventListener("submit", function(e) {
        e.preventDefault();

        const route = document.getElementById("route").value;
        const vehicle = document.getElementById("vehicle").value;

        const driver_1 = document.getElementById("driver1").value;
        const conductor_1 = document.getElementById("conductor1").value;
        const driver_2 = document.getElementById("driver2").value;
        const conductor_2 = document.getElementById("conductor2").value;

        const stages = document.getElementById("stages").value;

        const payload = {
            route: route,
            vehicle: vehicle,
            shift1: {
                driver: driver_1,
                conductor: conductor_1
            },
            shift2: {
                driver: driver_2,
                conductor: conductor_2
            },
            stages: stages.split(",").map(s => s.trim())
        };

        console.log("🚀 SENDING PAYLOAD:", payload);

        fetch(updateUrl, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
        })
        .then(res => res.json())
        .then(data => {
            console.log("🔥 RESPONSE:", data);

            const msg = document.getElementById("message");
            msg.innerText = data.message || data.error;
            msg.style.color = data.error ? "red" : "green";
        })
        .catch(err => {
            console.error("FETCH ERROR:", err);
        });
    });

});
</script>

{% endblock %}
