<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MatatuHub MIS</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background-color: #ffffff;
    font-family: Arial, sans-serif;
}

.sidebar {
    height: 100vh;
    background-color: #0b1c3d;
    color: white;
}

.sidebar a {
    color: white;
    text-decoration: none;
    padding: 8px;
    display: block;
}

.sidebar a:hover {
    background-color: #142a5c;
    padding-left: 12px;
    transition: 0.3s;
}
</style>
</head>

<body>

<div class="container-fluid">
    <div class="row">

        <!-- SIDEBAR -->
        <div class="col-md-2 sidebar p-3">
            <h4 class="text-center mb-4">MatatuHub</h4>
            <ul class="nav flex-column">
                <li class="nav-item mb-2">
                    <a href="{{ url_for('dashboard_bp.dashboard') }}" class="nav-link">Dashboard</a>
                </li>
                <li class="nav-item mb-2">
                    <a href="{{ url_for('vehicle_bp.vehicles') }}" class="nav-link">Vehicles</a>
                </li>
                <li class="nav-item mb-2">
                    <a href="{{ url_for('staff_bp.staff_management') }}" class="nav-link">Staff Management</a>
                </li>
                <li class="nav-item mb-2">
                    <a href="{{ url_for('routes_schedules.schedule_management') }}" class="nav-link">Schedule Management</a>
                </li>
                <li class="nav-item mb-2">
                    <a href="{{ url_for('payroll.payroll') }}" class="nav-link">Payroll</a>
                </li>
                <li class="nav-item mb-2">
                    <a href="{{ url_for('daraja.stk_page') }}" class="nav-link">Payments</a>
                </li>
                <li class="nav-item mb-2">
                    <a href="{{ url_for('report_bp.reports') }}" class="nav-link">Reports</a>
                </li>
                <li class="nav-item mt-4">
                    <a href="{{ url_for('auth_bp.login') }}" class="nav-link text-danger">Logout</a>
                </li>
            </ul>
        </div> <!-- sidebar -->

        <!-- MAIN CONTENT -->
        <div class="col-md-10 p-4">
            {% block content %}
            {% endblock %}
        </div> <!-- col-md-10 -->

    </div> <!-- row -->
</div> <!-- container-fluid -->

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
