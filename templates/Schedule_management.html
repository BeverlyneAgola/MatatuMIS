{% extends "layout/base.html" %}

{% block content %}

<style>
    .schedule-card {
        background: white;
        padding: 30px;
        border-radius: 10px;
        width: 400px;
        margin: 50px auto;
        text-align: center;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .schedule-card a {
        display: block;
        margin: 15px 0;
        padding: 12px;
        background: #0d1b2a;
        color: white;
        text-decoration: none;
        border-radius: 6px;
    }

    .schedule-card a:hover {
        background: #e63946;
    }
</style>

<div class="schedule-card">
    <h1>Schedule Management</h1>
    <p>What would you like to do?</p>

    <a href="{{ url_for('routes_schedules.view_schedules_page') }}">📅 View Schedules</a>
    <a href="{{ url_for('routes_schedules.update_schedule_page') }}">✏️ Update Schedule</a>
</div>

{% endblock %}
